<div class="home-container">
  <div class="home-card">

    <!-- Header -->
    <div class="card-header">
      <h1>Minhas Tarefas</h1>
      <div class="user-info">
        <span class="user-name">Olá, {{ getUserName() }}</span>
        <button class="btn-logout" (click)="logout()">Sair</button>
      </div>
    </div>

    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>

    <div *ngIf="isLoading" class="loading-overlay">
      <div class="loading-spinner"></div>
      <span>Carregando...</span>
    </div>

    <!--filtros-->
    <div class="filters">
      <button class="filter-btn"
              [class.active]="currentFilter === 'all'"
              (click)="changeFilter('all')">
        Todas ({{ getAllTodosCount() }})
      </button>
      <button class="filter-btn"
              [class.active]="currentFilter === 'pending'"
              (click)="changeFilter('pending')">
        Pendentes ({{ getPendingTodosCount() }})
      </button>
      <button class="filter-btn"
              [class.active]="currentFilter === 'completed'"
              (click)="changeFilter('completed')">
        Concluídas ({{ getCompletedTodosCount() }})
      </button>
    </div>

    <!--Lista de tarefas-->
    <div class="todo-list">
      <div *ngIf="getFilteredTodos().length === 0 && !isLoading" class="empty-message">
        <p>Nenhuma tarefa encontrada</p>
        <p class="empty-sub">Crie sua primeira tarefa abaixo!</p>
      </div>

      <div *ngFor="let todo of getCurrentPageTodos(); trackBy: trackByTodoId"
           class="todo-item"
           [class.removendo]="isRemovendo(todo.id)">

        <div class="todo-content">
          <span class="todo-name" [class.completed-text]="todo.isComplete">
            {{ todo.name }}
          </span>

          <div class="todo-actions">
            <button class="btn-toggle"
                    [class.completed]="todo.isComplete"
                    [class.loading]="updatingTodoId === todo.id"
                    (click)="toggleComplete(todo)"
                    [disabled]="updatingTodoId === todo.id || isLoading"
                    title="{{ todo.isComplete ? 'Marcar como pendente' : 'Marcar como concluída' }}">
              <span *ngIf="updatingTodoId === todo.id" class="spinner"></span>
              <span *ngIf="updatingTodoId !== todo.id">
                {{ todo.isComplete ? '✅' : '⬜' }}
              </span>
            </button>

            <span class="todo-status" [class.completed]="todo.isComplete">
              {{ todo.isComplete ? 'Concluída' : 'Pendente' }}
            </span>

            <button class="btn-delete"
                    (click)="deleteTodo(todo.id)"
                    [disabled]="isLoading || isRemovendo(todo.id)"
                    title="Excluir tarefa">
              🗑️
            </button>
          </div>
        </div>
      </div>
    </div>


    <div class="add-todo">
      <input type="text"
             [(ngModel)]="newTodoName"
             placeholder="Digite o nome da tarefa..."
             (keyup.enter)="addTodo()"
             class="todo-input"
             [disabled]="isLoading" />
      <button class="btn-add" (click)="addTodo()" [disabled]="isLoading">
        Adicionar
      </button>
    </div>

    <!--Páginas com as atividades-->
    <div class="pagination" *ngIf="getFilteredTodos().length > 0">
      <button class="page-btn"
              (click)="goToPage(currentPage - 1)"
              [disabled]="currentPage === 1 || isLoading">
        ◀
      </button>

      <span *ngFor="let page of getPages()" class="page-numbers">
        <button class="page-num"
                [class.active]="currentPage === page"
                (click)="goToPage(page)"
                [disabled]="isLoading">
          {{ page }}
        </button>
      </span>

      <button class="page-btn"
              (click)="goToPage(currentPage + 1)"
              [disabled]="currentPage === getTotalPages() || isLoading">
        ▶
      </button>
    </div>

    <div class="page-info" *ngIf="getFilteredTodos().length > 0">
      Página {{ currentPage }} de {{ getTotalPages() }}
      <span class="todo-count">
        ({{ getFilteredTodos().length }} tarefas)
      </span>
    </div>

    <!--Confirmação de exclusão-->
    <app-confirm [visivel]="mostrarModalConfirmacao"
                 [titulo]="'Excluir Tarefa'"
                 [mensagem]="'Tem certeza que deseja deletar a tarefa? Esta ação não pode ser desfeita.'"
                 (confirmado)="confirmarExclusaoTodo()"
                 (cancelado)="fecharModalConfirmacao()">
    </app-confirm>
  </div>
</div>
